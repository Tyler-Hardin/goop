[package]
name = "goop"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
axum = { version = "0.8", features = ["ws"] }
axum-extra = "0.12"
futures = "0.3"
rig = { version = "0.38", features = ["derive"] }
rig-derive = "0.38"
rustyline = "18.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
streamdown-parser = "0.1"
streamdown-render = "0.1"
subprocess = "1.1"
tokio = { version = "1.52", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
