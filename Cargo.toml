[package]
name = "goop"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
axum = { version = "0.8.8", features = ["ws"] }
axum-extra = "0.10.1"
futures = "0.3.32"
rig = { version = "0.38.2", features = ["derive"] }
rig-derive = "0.38.2"
rustyline = "18.0.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
streamdown-parser = "0.1.4"
streamdown-render = "0.1.4"
subprocess = "1.1.0"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
