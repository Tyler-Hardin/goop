# goop configuration — ~/.config/goop/config.toml
#
# Environment variable overrides this file:
#   GOOP_MODEL                     — model in provider/model format (e.g. "deepseek/deepseek-v4-pro")
#   GOOP_OLLAMA_BASE_URL           — Ollama API base URL (default: http://localhost:11434)
#   GOOP_COMPACTION              — compaction budget (integer or "80%")

# LLM model in litellm-style provider/model format.
# Provider is the first segment before "/", model is everything after.
# Supported providers: deepseek | openai | openrouter | groq | ollama | anthropic | zai
model = "{{ model }}"

# Maximum tokens per response.
max_tokens = {{ max_tokens }}

# Maximum tool-calling turns per prompt (safety limit).
default_max_turns = {{ default_max_turns }}

# ── Compaction ──────────────────────────────────────────────────────
# When the conversation exceeds a token budget, older messages are
# evicted and replaced with a rolling text summary (no extra LLM call).
#
# Accepts either:
#   compaction = 64000     # absolute token limit
#   compaction = "75%"      # percentage of model's context window
#
# Uncomment to enable.  Leave commented for unlimited context.
# compaction = "75%"

# Tool groups enabled for the agent.
# Available: file_ops, shell, ssh, web_fetch, computer_use
enabled_tool_groups = [{% for g in groups %}"{{ g }}"{% if not loop.last %}, {% endif %}{% endfor %}]

# Base URL for the Ollama API.  Only used when provider is ollama.
# Set this if Ollama runs on a nonstandard port or remote host.
# ollama_base_url = "{{ ollama_base_url }}"

# ── MCP servers (Model Context Protocol) ─────────────────────────────
# Define named MCP servers here.  Enable them globally (enabled_mcp_servers)
# or per-session in <name>.state.toml.
#
# HTTP transport:
# [mcp_servers.example]
# type = "http"
# url = "http://localhost:8080"
# shared = true          # spin up one instance, share across sessions
#
# Stdio transport:
# [mcp_servers.code_indexer]
# type = "stdio"
# command = "my-code-indexer"
# args = ["--project", "."]

# MCP servers enabled for all sessions.
# enabled_mcp_servers = []

# ── Speech-to-text (STT) ──────────────────────────────────────────────
# Local speech recognition via OpenAI Whisper.
# Models are downloaded once and cached in ~/.config/goop/models/whisper/
#
# [stt]
# enabled = true       # set to true to enable microphone input in the web UI
# model = "base"       # tiny | base | small | medium | large
