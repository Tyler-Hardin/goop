    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0c0e12;
        --surface: #16191e;
        --surface2: #1c2027;
        --border: #2a2f38;
        --border2: #363c47;
        --dim: #7d8794;
        --dim2: #5a6370;
        --fg: #d2d7df;
        --fg2: #e8ecf1;
        --green: #6be07c;
        --blue: #6db3f2;
        --blue-dim: #3a7fc1;
        --yellow: #e2b96f;
        --red: #f2625a;
        --red-dim: #a03a3a;
        --cyan: #4dd4c0;
        --purple: #b99aff;
        --radius: 12px;
        --radius-sm: 8px;
        --font: system-ui, -apple-system, "Segoe UI", sans-serif;
        --mono:
          "Cascadia Code", "JetBrains Mono", ui-monospace, "SF Mono",
          "Fira Code", monospace;
        --sidebar-w: 250px;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font);
        font-size: 15px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }

      /* ── layout ────────────────────────────────────── */

      body {
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        grid-template-rows: 1fr;
        height: 100dvh;
      }

      /* ── sidebar ──────────────────────────────────── */

      nav {
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      nav .sidebar-header {
        padding: 13px 16px;
        border-bottom: 1px solid var(--border);
        font-weight: 650;
        font-size: 15px;
        letter-spacing: -0.2px;
        color: var(--fg2);
        display: flex;
        align-items: center;
        gap: 9px;
        flex-shrink: 0;
      }
      nav .sidebar-header .logo-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      nav .session-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0;
        -webkit-overflow-scrolling: touch;
      }

      nav .session-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 13.5px;
        color: var(--dim);
        transition:
          background 0.15s,
          color 0.15s;
        border-left: 3px solid transparent;
        user-select: none;
      }
      nav .session-item:hover {
        background: var(--surface2);
        color: var(--fg);
      }
      nav .session-item.active {
        background: rgba(109, 179, 242, 0.06);
        color: var(--fg2);
        border-left-color: var(--blue);
        font-weight: 500;
      }
      nav .session-item .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      nav .session-item .del-btn {
        visibility: hidden;
        background: none;
        border: none;
        color: var(--dim2);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 2px 5px;
        border-radius: 4px;
        transition:
          color 0.15s,
          background 0.15s;
      }
      nav .session-item:hover .del-btn {
        visibility: visible;
      }
      nav .session-item .del-btn:hover {
        color: var(--red);
        background: rgba(242, 98, 90, 0.1);
      }

      nav .sidebar-footer {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      nav .new-btn {
        width: 100%;
        background: var(--surface2);
        border: 1px dashed var(--border2);
        border-radius: var(--radius-sm);
        color: var(--dim);
        cursor: pointer;
        font-size: 13px;
        padding: 8px;
        transition:
          border-color 0.2s,
          color 0.2s,
          background 0.2s;
        font-family: var(--font);
      }
      nav .new-btn:hover {
        border-color: var(--blue);
        color: var(--blue);
        background: rgba(109, 179, 242, 0.04);
      }

      /* ── main area ────────────────────────────────── */

      .main {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      /* ── header ───────────────────────────────────── */

      header {
        padding: 11px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        background: var(--surface);
      }
      header .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--dim2);
        box-shadow: 0 0 6px rgba(125, 135, 148, 0.3);
        transition:
          background 0.3s,
          box-shadow 0.3s;
      }
      header .dot.live {
        background: var(--green);
        box-shadow: 0 0 10px rgba(107, 224, 124, 0.5);
      }
      header .title {
        font-weight: 650;
        font-size: 15px;
        letter-spacing: -0.2px;
        color: var(--fg2);
      }
      header .status {
        font-size: 12px;
        color: var(--dim);
        margin-left: auto;
        transition: color 0.3s;
        font-feature-settings: "ss02";
      }
      header .menu-btn {
        display: none;
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        padding: 4px 6px;
      }

      /* ── message list ─────────────────────────────── */

      /* Do NOT set scroll-behavior: smooth here.  Auto-scroll during
         LLM streaming sets scrollTop on every animation frame; smooth
         scrolling can never catch up because the target keeps moving.
         scrollDown() uses scrollTo({ behavior: "auto" }) explicitly. */

      main {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        background:
          radial-gradient(
            ellipse at 50% 0%,
            rgba(109, 179, 242, 0.02) 0%,
            transparent 60%
          ),
          var(--bg);
      }

      .msg {
        max-width: 78%;
        padding: 11px 16px;
        border-radius: var(--radius);
        font-size: 14.5px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        animation: fadeIn 0.2s ease;
        position: relative;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg.user {
        align-self: flex-end;
        background: var(--blue-dim);
        color: #fff;
        border-bottom-right-radius: 4px;
        font-weight: 450;
      }

      .msg.assistant {
        align-self: flex-start;
        background: var(--surface2);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--border);
      }

      .msg.thinking {
        align-self: flex-start;
        color: var(--dim);
        font-style: italic;
        font-size: 13px;
        background: none;
        padding: 3px 18px;
        opacity: 0.8;
      }
      .msg.thinking::before {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--dim);
        margin-right: 8px;
        vertical-align: middle;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }

      .msg.tool {
        align-self: flex-start;
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--cyan);
        font-family: var(--mono);
        font-size: 13px;
        max-width: 85%;
        cursor: pointer;
        user-select: none;
        transition: border-color 0.2s;
      }
      .msg.tool:hover {
        border-color: var(--cyan);
      }
      .msg.tool .tool-header {
        padding: 9px 14px;
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .msg.tool .tool-header .arrow {
        color: var(--cyan);
        font-size: 13px;
        line-height: 1.4;
        transition: transform 0.2s;
        flex-shrink: 0;
      }
      .msg.tool.open .tool-header .arrow {
        transform: rotate(90deg);
      }
      .msg.tool .tool-header .info {
        flex: 1;
        min-width: 0;
      }
      .msg.tool .name {
        color: var(--cyan);
        font-weight: 650;
        font-size: 13.5px;
        margin-bottom: 2px;
      }
      .msg.tool .arg {
        color: var(--dim);
        margin: 2px 0;
      }
      .msg.tool .arg b {
        color: var(--fg);
        font-weight: 550;
      }
      .msg.tool .tool-body {
        display: none;
        border-top: 1px solid var(--border);
        padding: 9px 14px;
        color: var(--dim);
        font-size: 12.5px;
        font-family: var(--mono);
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 220px;
        overflow-y: auto;
      }
      .msg.tool.open .tool-body {
        display: block;
      }

      .msg.result {
        align-self: flex-start;
        color: var(--dim);
        font-size: 12.5px;
        font-family: var(--mono);
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 9px 14px;
        max-height: 180px;
        overflow-y: auto;
        max-width: 90%;
        border-radius: var(--radius-sm);
      }

      .msg.error {
        align-self: flex-start;
        color: var(--red);
        background: rgba(242, 98, 90, 0.08);
        border: 1px solid rgba(242, 98, 90, 0.18);
        font-weight: 480;
      }

      .msg.final {
        align-self: center;
        color: var(--dim2);
        font-size: 11px;
        background: none;
        padding: 2px 0;
        letter-spacing: 0.4px;
      }

      /* ── rendered markdown ────────────────────────── */

      .msg.assistant.rendered {
        white-space: normal;
      }

      .msg.assistant.rendered h1,
      .msg.assistant.rendered h2,
      .msg.assistant.rendered h3,
      .msg.assistant.rendered h4 {
        margin: 0.7em 0 0.35em;
        font-weight: 650;
        line-height: 1.3;
        color: var(--fg2);
      }
      .msg.assistant.rendered h1 {
        font-size: 1.35em;
      }
      .msg.assistant.rendered h2 {
        font-size: 1.18em;
        padding-bottom: 0.2em;
        border-bottom: 1px solid var(--border);
      }
      .msg.assistant.rendered h3 {
        font-size: 1.06em;
      }
      .msg.assistant.rendered h4 {
        font-size: 0.95em;
        color: var(--dim);
      }

      .msg.assistant.rendered p {
        margin: 0.45em 0;
      }
      .msg.assistant.rendered p:first-child {
        margin-top: 0;
      }
      .msg.assistant.rendered p:last-child {
        margin-bottom: 0;
      }

      .msg.assistant.rendered ul,
      .msg.assistant.rendered ol {
        margin: 0.35em 0;
        padding-left: 1.6em;
      }
      .msg.assistant.rendered li {
        margin: 0.18em 0;
      }

      .msg.assistant.rendered blockquote {
        margin: 0.45em 0;
        padding: 3px 12px;
        border-left: 3px solid var(--cyan);
        color: var(--dim);
        background: rgba(77, 212, 192, 0.04);
        border-radius: 0 6px 6px 0;
      }
      .msg.assistant.rendered a {
        color: var(--blue);
        text-decoration: none;
      }
      .msg.assistant.rendered a:hover {
        text-decoration: underline;
      }
      .msg.assistant.rendered hr {
        margin: 0.7em 0;
        border: none;
        border-top: 1px solid var(--border);
      }

      .msg.assistant.rendered table {
        margin: 0.45em 0;
        border-collapse: collapse;
        width: 100%;
        font-size: 13px;
        border-radius: 6px;
        overflow: hidden;
      }
      .msg.assistant.rendered th,
      .msg.assistant.rendered td {
        padding: 6px 12px;
        border: 1px solid var(--border);
        text-align: left;
      }
      .msg.assistant.rendered th {
        background: var(--surface);
        font-weight: 650;
        color: var(--fg2);
      }
      .msg.assistant.rendered td {
        background: var(--surface2);
      }

      .msg.assistant.rendered :not(pre) > code {
        background: rgba(109, 179, 242, 0.1);
        padding: 1.5px 6px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 0.88em;
        color: var(--blue);
      }

      .msg.assistant.rendered pre {
        margin: 0.5em 0;
        padding: 12px 15px;
        border-radius: var(--radius-sm);
        background: #0a0d11;
        border: 1px solid var(--border);
        overflow-x: auto;
        white-space: pre;
      }
      .msg.assistant.rendered pre code {
        background: none;
        padding: 0;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.5;
        color: var(--fg);
      }

      /* ── input bar ────────────────────────────────── */

      footer {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        gap: 10px;
        background: var(--surface);
      }
      footer textarea {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 11px 16px;
        color: var(--fg);
        font-size: 15px;
        outline: none;
        font-family: var(--font);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        resize: none;
        min-height: 46px;
        max-height: 200px;
        line-height: 1.55;
      }
      footer textarea:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(109, 179, 242, 0.12);
      }
      footer textarea::placeholder {
        color: var(--dim2);
      }

      footer button {
        background: var(--blue);
        color: #0a0d11;
        border: none;
        border-radius: var(--radius-sm);
        padding: 11px 22px;
        font-weight: 650;
        font-size: 14px;
        cursor: pointer;
        transition:
          background 0.2s,
          opacity 0.2s,
          box-shadow 0.2s;
        white-space: nowrap;
      }
      footer button:hover {
        background: #8bc7f6;
      }
      footer button:active {
        opacity: 0.85;
        transform: scale(0.98);
      }
      footer button:disabled {
        opacity: 0.35;
        cursor: default;
        pointer-events: none;
      }
      footer button.cancel {
        background: var(--red);
        color: #fff;
      }
      footer button.cancel:hover {
        background: #f87870;
      }

      /* ── empty state ──────────────────────────────── */

      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--dim2);
        gap: 8px;
      }
      .empty-state .empty-icon {
        opacity: 0.35;
        margin-bottom: 4px;
      }
      .empty-state .hint {
        font-size: 14px;
      }

      /* ── sidebar overlay (mobile) ─────────────────── */

      .sidebar-overlay {
        display: none;
      }

      /* ── responsive ───────────────────────────────── */

      @media (max-width: 750px) {
        body {
          grid-template-columns: 1fr;
        }
        nav {
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          width: var(--sidebar-w);
          z-index: 100;
          transform: translateX(-100%);
          transition: transform 0.25s ease;
          box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
        }
        nav.open {
          transform: translateX(0);
        }
        .sidebar-overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.4);
          z-index: 99;
        }
        .sidebar-overlay.open {
          display: block;
        }
        header .menu-btn {
          display: block;
        }
        main {
          padding: 14px;
          gap: 10px;
        }
        .msg {
          max-width: 88%;
          font-size: 14px;
          padding: 10px 14px;
        }
        .msg.tool {
          max-width: 94%;
        }
        .msg.result {
          max-width: 96%;
        }
        header {
          padding: 10px 14px;
        }
        footer {
          padding: 10px 14px;
          gap: 8px;
        }
        footer textarea {
          font-size: 16px;
        } /* prevent iOS zoom */
        footer button {
          padding: 11px 16px;
          font-size: 14px;
        }
      }

      @media (max-width: 400px) {
        main {
          padding: 10px;
          gap: 8px;
        }
        .msg {
          max-width: 93%;
          font-size: 13.5px;
          padding: 9px 12px;
        }
        header {
          padding: 8px 10px;
        }
        footer {
          padding: 8px 10px;
        }
      }
    </style>
  </head>

            alt=""
          />
          <div class="hint">Select or create a session to begin</div>
        </div>
      </main>

      <footer>
        <textarea
          id="input"
          placeholder="Ask anything…"
          autocomplete="off"
          autofocus
          rows="1"
        ></textarea>
        <button id="send" disabled>Send</button>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script>
      // ── DOM refs ────────────────────────────────────
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      const menuBtn = document.getElementById("menuBtn");
      const sessionList = document.getElementById("sessionList");
      const newSessionBtn = document.getElementById("newSessionBtn");
      const log = document.getElementById("log");
      const emptyState = document.getElementById("emptyState");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const dot = document.getElementById("dot");
      const statusEl = document.getElementById("status");
      const titleEl = document.getElementById("title");

      // ── state ────────────────────────────────────────
      let ws = null;
      let currentSession = null; // name of the active session
      let sessions = []; // [{ name }]
      let thinkingEl = null;
      let assistantEl = null;
      let buf = "";
      let running = false;
      let lastToolEl = null;
      let userAtBottom = true; // tracks whether user has scrolled away

      // ── sidebar toggle (mobile) ─────────────────────
      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("open");
      });
      overlay.addEventListener("click", () => {
        sidebar.classList.remove("open");
        overlay.classList.remove("open");
      });

      // ── session list ─────────────────────────────────
      async function fetchSessions() {
        const res = await fetch("/api/sessions");
        if (!res.ok) return;
        sessions = await res.json();
        renderSessionList();
      }

      function renderSessionList() {
        sessionList.innerHTML = "";
        for (const s of sessions) {
          const el = document.createElement("div");
          el.className =
            "session-item" + (s === currentSession ? " active" : "");
          el.innerHTML = `<span class="name">${esc(s)}</span><button class="del-btn" title="Delete session">&times;</button>`;
          el.querySelector(".name").addEventListener("click", () =>
            switchSession(s),
          );
          el.querySelector(".del-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            deleteSession(s);
          });
          sessionList.appendChild(el);
        }
      }

      async function switchSession(name) {
        if (name === currentSession) return;
        sidebar.classList.remove("open");
        overlay.classList.remove("open");

        // Disconnect old socket.
        if (ws) {
          ws.onclose = null; // don't reconnect on intentional close
          ws.close();
          ws = null;
        }

        // Clear UI and reset running state (the old session's
        // FinalResponse/Cancelled events went to the closed socket).
        clearMessages();
        setRunning(false);
        currentSession = name;
        titleEl.textContent = name;
        updateHash();
        renderSessionList();
        connect();
      }

      async function createSession() {
        const name = prompt("Session name (leave blank for auto-generated):");
        const body = name ? { name } : {};
        const res = await fetch("/api/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) return;
        const data = await res.json();
        await fetchSessions();
        switchSession(data.name);
      }

      async function deleteSession(name) {
        const res = await fetch(`/api/sessions/${encodeURIComponent(name)}`, {
          method: "DELETE",
        });
        if (!res.ok) return;
        // Remove from local list.
        sessions = sessions.filter((s) => s !== name);
        // If we deleted the current session, switch to another or clear.
        if (name === currentSession) {
          if (ws) {
            ws.onclose = null;
            ws.close();
            ws = null;
          }
          clearMessages();
          setRunning(false);
          currentSession = null;
          titleEl.textContent = "goop";
          updateHash();
          if (sessions.length > 0) {
            switchSession(sessions[0]);
          } else {
            emptyState.style.display = "flex";
            dot.classList.remove("live");
            statusEl.textContent = "no session";
            sendBtn.disabled = true;
          }
        }
        renderSessionList();
      }

      newSessionBtn.addEventListener("click", createSession);

      // ── URL hash ─────────────────────────────────────
      function updateHash() {
        if (currentSession) {
          history.replaceState(null, "", `#session=${currentSession}`);
        } else {
          history.replaceState(null, "", window.location.pathname);
        }
      }

      function sessionFromHash() {
        const m = window.location.hash.match(/^#session=(.+)$/);
        return m ? decodeURIComponent(m[1]) : null;
      }

      // ── websocket ────────────────────────────────────
      function connect() {
        if (!currentSession) return;

        const proto = location.protocol === "https:" ? "wss" : "ws";
        const host = location.host || "127.0.0.1:8187";
        const url = `${proto}://${host}/ws?session=${encodeURIComponent(currentSession)}`;
        ws = new WebSocket(url);

        ws.onopen = () => {
          dot.classList.add("live");
          statusEl.textContent = "connected";
          sendBtn.disabled = false;
          emptyState.style.display = "none";
        };

        ws.onclose = () => {
          dot.classList.remove("live");
          statusEl.textContent = "reconnecting…";
          sendBtn.disabled = true;
          // Reconnect after a delay if we still have a current session.
          if (currentSession) {
            setTimeout(connect, 2000);
          }
        };

        ws.onmessage = (e) => {
          const evt = JSON.parse(e.data);
          handle(evt);
        };
      }

      // ── event handling ───────────────────────────────
      function handle(evt) {
        switch (evt.type) {
          case "SessionState":
            setRunning(evt.data.running);
            return;

          case "UserPrompt":
            append("user", evt.data.content);
            scrollDown(true);
            return;

          case "Thinking":
            if (!thinkingEl) {
              thinkingEl = div("thinking", "thinking…");
              log.appendChild(thinkingEl);
            }
            break;

          case "AssistantText":
            removeThinking();
            buf += evt.data;
            if (!assistantEl) {
              assistantEl = div("assistant", buf);
              log.appendChild(assistantEl);
            } else {
              assistantEl.textContent = buf;
            }
            break;

          case "ToolCall": {
            removeThinking();
            flushBufWithEl();
            const t = evt.data;
            const el = document.createElement("div");
            el.className = "msg tool tool-call";
            let html =
              '<div class="tool-header"><span class="arrow">▸</span><div class="info">';
            html += `<div class="name">${esc(t.name)}</div>`;
            if (t.arguments && typeof t.arguments === "object") {
              for (const [k, v] of Object.entries(t.arguments)) {
                const val =
                  typeof v === "string"
                    ? trunc(esc(v), 120)
                    : trunc(esc(JSON.stringify(v)), 120);
                html += `<div class="arg"><b>${esc(k)}:</b> ${val}</div>`;
              }
            }
            html += "</div></div>";
            html += '<div class="tool-body"></div>';
            el.innerHTML = html;
            el.querySelector(".tool-header").addEventListener("click", () => {
              el.classList.toggle("open");
              scrollDown();
            });
            log.appendChild(el);
            lastToolEl = el;
            break;
          }

          case "ToolResult": {
            flushBufWithEl();
            if (evt.data.content && lastToolEl) {
              const body = lastToolEl.querySelector(".tool-body");
              if (body) {
                body.textContent = trunc(evt.data.content, 500);
              }
              lastToolEl = null;
            }
            break;
          }

          case "FinalResponse":
            removeThinking();
            if (assistantEl) {
              const raw = assistantEl.textContent;
              assistantEl.innerHTML = DOMPurify.sanitize(marked.parse(raw));
              assistantEl.classList.add("rendered");
            }
            flushBufWithEl();
            append("final", "—");
            setRunning(false);
            break;

          case "Error":
            removeThinking();
            flushBufWithEl();
            append("error", evt.data);
            setRunning(false);
            break;

          case "Cancelled":
            removeThinking();
            flushBufWithEl();
            append("final", "cancelled");
            setRunning(false);
            break;
        }
        scrollDown();
      }

      function clearMessages() {
        log.innerHTML = "";
        thinkingEl = null;
        assistantEl = null;
        buf = "";
        lastToolEl = null;
        userAtBottom = true;
        // Re-add empty state.
        log.appendChild(emptyState);
      }

      function flushBufWithEl() {
        assistantEl = null;
        buf = "";
      }

      function removeThinking() {
        if (thinkingEl) {
          thinkingEl.remove();
          thinkingEl = null;
        }
      }

      function append(cls, text) {
        const el = div(cls, text);
        log.appendChild(el);
        assistantEl = cls === "assistant" ? el : assistantEl;
      }

      function div(cls, text) {
        const el = document.createElement("div");
        el.className = "msg " + cls;
        el.textContent = text;
        return el;
      }

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function trunc(s, n) {
        return s.length > n ? s.slice(0, n - 1) + "…" : s;
      }

      function scrollDown(force) {
        if (force || userAtBottom) {
          requestAnimationFrame(() => {
            log.scrollTo({ top: log.scrollHeight, behavior: "auto" });
          });
        }
      }

      // Track whether the user is scrolled to the bottom.  The scroll
      // event fires on both user-initiated and programmatic scrolls, so
      // this stays correct regardless of who moved the viewport.
      log.addEventListener("scroll", () => {
        const threshold = 50;
        userAtBottom =
          log.scrollHeight - log.scrollTop - log.clientHeight <= threshold;
      });

      // ── input ────────────────────────────────────
      input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 200) + "px";
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          doSend();
        }
      });

      sendBtn.addEventListener("click", doSend);

      function setRunning(v) {
        running = v;
        if (v) {
          sendBtn.textContent = "Cancel";
          sendBtn.classList.add("cancel");
        } else {
          sendBtn.textContent = "Send";
          sendBtn.classList.remove("cancel");
        }
      }

      function doSend() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        if (running) {
          ws.send(JSON.stringify({ type: "cancel" }));
          return;
        }

        const text = input.value.trim();
        if (!text) return;
        ws.send(JSON.stringify({ type: "prompt", content: text }));
        input.value = "";
        input.style.height = "auto";
        input.focus();
        setRunning(true);
      }

      // ── start ────────────────────────────────────
      async function init() {
        await fetchSessions();

        // Determine initial session: URL hash > first in list > none.
        const hashSession = sessionFromHash();
        if (hashSession) {
          // If it's not in the list, add it (it may exist on disk).
          if (!sessions.includes(hashSession)) {
            sessions.push(hashSession);
            sessions.sort();
          }
          switchSession(hashSession);
        } else if (sessions.length > 0) {
          switchSession(sessions[0]);
        } else {
          // No sessions at all — show empty state.
          emptyState.style.display = "flex";
          dot.classList.remove("live");
          statusEl.textContent = "no session";
          sendBtn.disabled = true;
        }
      }

      init();
    </script>
  </body>
</html>
