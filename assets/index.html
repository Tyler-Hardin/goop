<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>goop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --dim: #8b949e;
    --fg: #c9d1d9;
    --green: #7ee787;
    --blue: #79c0ff;
    --yellow: #d2a8ff;
    --red: #ff7b72;
    --cyan: #39d2c0;
    --radius: 12px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: system-ui, -apple-system, sans-serif; }
  body { display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; }

  /* header */
  header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  header .dot.live { background: var(--green); }
  header .title { font-weight: 600; font-size: 14px; }
  header .status { font-size: 12px; color: var(--dim); margin-left: auto; }

  /* message list */
  main {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 90%; padding: 10px 14px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end; background: var(--blue); color: #000;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }
  .msg.thinking { align-self: flex-start; color: var(--dim); font-style: italic; font-size: 13px; background: none; padding: 4px 14px; }
  .msg.tool { align-self: flex-start; background: var(--surface); border-left: 3px solid var(--cyan); font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 13px; }
  .msg.tool .name { color: var(--cyan); font-weight: 600; }
  .msg.tool .arg { color: var(--dim); }
  .msg.tool .arg b { color: var(--fg); }
  .msg.result { align-self: flex-start; color: var(--dim); font-size: 12px; font-family: ui-monospace, monospace; background: none; padding: 2px 14px; max-height: 120px; overflow-y: auto; }
  .msg.error { align-self: flex-start; color: var(--red); background: rgba(255,123,114,0.1); }
  .msg.final { align-self: center; color: var(--dim); font-size: 11px; background: none; }

  /* rendered markdown */
  .msg.assistant.rendered { white-space: normal; }
  .msg.assistant.rendered h1,
  .msg.assistant.rendered h2,
  .msg.assistant.rendered h3,
  .msg.assistant.rendered h4 { margin: 0.6em 0 0.3em; font-weight: 600; line-height: 1.3; }
  .msg.assistant.rendered h1 { font-size: 1.3em; }
  .msg.assistant.rendered h2 { font-size: 1.15em; padding-bottom: 0.2em; border-bottom: 1px solid var(--border); }
  .msg.assistant.rendered h3 { font-size: 1.05em; }
  .msg.assistant.rendered p { margin: 0.4em 0; }
  .msg.assistant.rendered p:first-child { margin-top: 0; }
  .msg.assistant.rendered p:last-child { margin-bottom: 0; }
  .msg.assistant.rendered ul,
  .msg.assistant.rendered ol { margin: 0.3em 0; padding-left: 1.5em; }
  .msg.assistant.rendered li { margin: 0.15em 0; }
  .msg.assistant.rendered blockquote {
    margin: 0.4em 0; padding: 2px 10px;
    border-left: 3px solid var(--cyan); color: var(--dim);
  }
  .msg.assistant.rendered a { color: var(--blue); text-decoration: none; }
  .msg.assistant.rendered a:hover { text-decoration: underline; }
  .msg.assistant.rendered hr { margin: 0.6em 0; border: none; border-top: 1px solid var(--border); }
  .msg.assistant.rendered table { margin: 0.4em 0; border-collapse: collapse; width: 100%; font-size: 13px; }
  .msg.assistant.rendered th,
  .msg.assistant.rendered td { padding: 5px 10px; border: 1px solid var(--border); text-align: left; }
  .msg.assistant.rendered th { background: var(--surface); font-weight: 600; }
  .msg.assistant.rendered :not(pre) > code {
    background: rgba(139,148,158,0.15); padding: 1px 5px; border-radius: 4px;
    font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 0.9em;
  }
  .msg.assistant.rendered pre {
    margin: 0.4em 0; padding: 10px 12px; border-radius: 8px;
    background: #0d1117; border: 1px solid var(--border);
    overflow-x: auto; white-space: pre;
  }
  .msg.assistant.rendered pre code {
    background: none; padding: 0; font-family: ui-monospace, 'Cascadia Code', monospace;
    font-size: 13px; line-height: 1.45; color: var(--fg);
  }

  /* input bar */
  footer {
    padding: 10px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; gap: 8px;
  }
  footer input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--fg); font-size: 15px; outline: none;
  }
  footer input:focus { border-color: var(--blue); }
  footer button {
    background: var(--blue); color: #000; border: none; border-radius: 8px;
    padding: 10px 18px; font-weight: 600; font-size: 14px; cursor: pointer;
  }
  footer button:active { opacity: 0.8; }
  footer button:disabled { opacity: 0.4; cursor: default; }
  footer button.cancel {
    background: var(--red); color: #fff;
  }

  /* mobile tweaks */
  @media (max-width: 480px) {
    header { padding: 8px 12px; }
    main { padding: 10px; gap: 8px; }
    .msg { font-size: 13px; padding: 8px 12px; }
    footer { padding: 8px 10px; }
    footer input { font-size: 16px; } /* prevent iOS zoom */
  }
</style>
</head>
<body>

<header>
  <div class="dot" id="dot"></div>
  <span class="title">goop</span>
  <span class="status" id="status">connecting…</span>
</header>

<main id="log"></main>

<footer>
  <input id="input" type="text" placeholder="Ask anything…" autocomplete="off" autofocus>
  <button id="send" disabled>Send</button>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<script>
const log = document.getElementById('log');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const dot = document.getElementById('dot');
const statusEl = document.getElementById('status');

let ws = null;
let thinkingEl = null;
let assistantEl = null;
let buf = '';
let running = false;  // true while the LLM is generating

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    dot.classList.add('live');
    statusEl.textContent = 'connected';
    sendBtn.disabled = false;
  };

  ws.onclose = () => {
    dot.classList.remove('live');
    statusEl.textContent = 'reconnecting…';
    sendBtn.disabled = true;
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const evt = JSON.parse(e.data);
    handle(evt);
  };
}

function handle(evt) {
  switch (evt.type) {
    case 'UserPrompt':
      append('user', evt.data.content);
      break;

    case 'Thinking':
      if (!thinkingEl) {
        thinkingEl = div('thinking', 'thinking…');
        log.appendChild(thinkingEl);
      }
      break;

    case 'AssistantText':
      removeThinking();
      buf += evt.data;
      // Update the current assistant message in real-time.
      if (!assistantEl) {
        assistantEl = div('assistant', buf);
        log.appendChild(assistantEl);
      } else {
        assistantEl.textContent = buf;
      }
      break;

    case 'ToolCall': {
      removeThinking();
      flushBufWithEl();
      const t = evt.data;
      let html = `<div class="name">▸ ${esc(t.name)}</div>`;
      if (t.arguments && typeof t.arguments === 'object') {
        for (const [k, v] of Object.entries(t.arguments)) {
          const val = typeof v === 'string' ? trunc(esc(v), 120) : trunc(esc(JSON.stringify(v)), 120);
          html += `<div class="arg"><b>${esc(k)}:</b> ${val}</div>`;
        }
      }
      appendRaw('tool', html);
      break;
    }

    case 'ToolResult': {
      flushBufWithEl();
      if (evt.data.content) {
        append('result', trunc(evt.data.content, 500));
      }
      break;
    }

    case 'FinalResponse':
      removeThinking();
      if (assistantEl) {
        const raw = assistantEl.textContent;
        assistantEl.innerHTML = DOMPurify.sanitize(marked.parse(raw));
        assistantEl.classList.add('rendered');
      }
      flushBufWithEl();
      append('final', '—');
      setRunning(false);
      break;

    case 'Error':
      removeThinking();
      flushBufWithEl();
      append('error', evt.data);
      setRunning(false);
      break;

    case 'Cancelled':
      removeThinking();
      flushBufWithEl();
      append('final', 'cancelled');
      setRunning(false);
      break;
  }
  scrollDown();
}

function flushBufWithEl() {
  // The assistantEl already has the full text; just finalize pointer.
  assistantEl = null;
  buf = '';
}

function removeThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
}

function append(cls, text) {
  const el = div(cls, text);
  log.appendChild(el);
  assistantEl = cls === 'assistant' ? el : assistantEl;
}

function appendRaw(cls, html) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.innerHTML = html;
  log.appendChild(el);
}

function div(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  return el;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function trunc(s, n) {
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function scrollDown() {
  requestAnimationFrame(() => {
    log.scrollTop = log.scrollHeight;
  });
}

// ── input ────────────────────────────────────

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
});

sendBtn.addEventListener('click', doSend);

function setRunning(v) {
  running = v;
  if (v) {
    sendBtn.textContent = 'Cancel';
    sendBtn.classList.add('cancel');
  } else {
    sendBtn.textContent = 'Send';
    sendBtn.classList.remove('cancel');
  }
}

function doSend() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  if (running) {
    // Cancel the running LLM.
    ws.send(JSON.stringify({ type: 'cancel' }));
    return;
  }

  const text = input.value.trim();
  if (!text) return;
  ws.send(JSON.stringify({ type: 'prompt', content: text }));
  input.value = '';
  input.focus();
  setRunning(true);
}

// ── start ────────────────────────────────────

connect();
</script>
</body>
</html>
