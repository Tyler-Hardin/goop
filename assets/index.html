<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>goop</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0c0e12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="goop" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <link rel="icon" type="image/png" href="/icon-192.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0c0e12;
        --surface: #16191e;
        --surface2: #1c2027;
        --border: #2a2f38;
        --border2: #363c47;
        --dim: #7d8794;
        --dim2: #5a6370;
        --fg: #d2d7df;
        --fg2: #e8ecf1;
        --green: #6be07c;
        --blue: #6db3f2;
        --blue-dim: #3a7fc1;
        --yellow: #e2b96f;
        --red: #f2625a;
        --red-dim: #a03a3a;
        --cyan: #4dd4c0;
        --purple: #b99aff;
        --radius: 12px;
        --radius-sm: 8px;
        --font: system-ui, -apple-system, "Segoe UI", sans-serif;
        --mono:
          "Cascadia Code", "JetBrains Mono", ui-monospace, "SF Mono",
          "Fira Code", monospace;
        --sidebar-w: 250px;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font);
        font-size: 15px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        /* overscroll-behavior-x: none prevents Chrome's swipe-to-back. */
        overscroll-behavior-x: none;
      }

      /* ── layout ────────────────────────────────────── */

      body {
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        grid-template-rows: 1fr;
        height: 100dvh;
      }

      /* ── sidebar ──────────────────────────────────── */

      nav {
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      nav .sidebar-header {
        padding: 13px 16px;
        border-bottom: 1px solid var(--border);
        font-weight: 650;
        font-size: 15px;
        letter-spacing: -0.2px;
        color: var(--fg2);
        display: flex;
        align-items: center;
        gap: 9px;
        flex-shrink: 0;
        min-height: 49px;
      }
      nav .sidebar-header .logo-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      nav .session-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0;
        -webkit-overflow-scrolling: touch;
      }

      nav .session-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 13.5px;
        color: var(--dim);
        transition:
          background 0.15s,
          color 0.15s;
        border-left: 3px solid transparent;
        user-select: none;
      }
      nav .session-item:hover {
        background: var(--surface2);
        color: var(--fg);
      }
      nav .session-item.active {
        background: rgba(109, 179, 242, 0.06);
        color: var(--fg2);
        border-left-color: var(--blue);
        font-weight: 500;
      }
      nav .session-item .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      nav .session-item .del-btn {
        visibility: hidden;
        background: none;
        border: none;
        color: var(--dim2);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 2px 5px;
        border-radius: 4px;
        transition:
          color 0.15s,
          background 0.15s;
      }
      nav .session-item:hover .del-btn {
        visibility: visible;
      }
      nav .session-item .del-btn:hover {
        color: var(--red);
        background: rgba(242, 98, 90, 0.1);
      }

      nav .sidebar-footer {
        padding: 12px 14px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        min-height: 71px;
        display: flex;
        align-items: center;
      }
      nav .new-btn {
        width: 100%;
        background: rgba(109, 179, 242, 0.06);
        border: 1px dashed var(--border2);
        border-radius: var(--radius-sm);
        color: var(--fg);
        cursor: pointer;
        font-size: 14px;
        font-weight: 650;
        padding: 11px;
        transition:
          border-color 0.2s,
          color 0.2s,
          background 0.2s;
        font-family: var(--font);
      }
      nav .new-btn:hover {
        border-color: var(--blue);
        color: var(--blue);
        background: rgba(109, 179, 242, 0.1);
      }

      /* ── main area ────────────────────────────────── */

      .main {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      /* ── header ───────────────────────────────────── */

      header {
        padding: 13px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        background: var(--surface);
        min-height: 49px;
      }
      header .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--dim2);
        box-shadow: 0 0 6px rgba(125, 135, 148, 0.3);
        transition:
          background 0.3s,
          box-shadow 0.3s;
      }
      header .dot.live {
        background: var(--green);
        box-shadow: 0 0 10px rgba(107, 224, 124, 0.5);
      }
      header .title {
        font-weight: 650;
        font-size: 15px;
        letter-spacing: -0.2px;
        color: var(--fg2);
      }
      header .status {
        font-size: 12px;
        color: var(--dim);
        margin-left: auto;
        transition: color 0.3s;
        font-feature-settings: "ss02";
      }
      header .menu-btn {
        display: none;
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        padding: 4px 6px;
      }
      header .reload-btn {
        background: none;
        border: none;
        color: var(--dim2);
        cursor: pointer;
        font-size: 17px;
        line-height: 1;
        padding: 2px 6px;
        border-radius: 4px;
        transition: color 0.2s;
      }
      header .reload-btn:hover {
        color: var(--blue);
      }

      /* ── message list ─────────────────────────────── */

      /* Do NOT set scroll-behavior: smooth here.  Auto-scroll during
         LLM streaming sets scrollTop on every animation frame; smooth
         scrolling can never catch up because the target keeps moving.
         scrollDown() uses scrollTo({ behavior: "auto" }) explicitly. */

      main {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        /* overscroll-behavior-y: none stops Chrome's native pull-to-refresh
           and iOS rubber-banding, so our JS handler owns the gesture. */
        overscroll-behavior-y: none;
        background:
          radial-gradient(
            ellipse at 50% 0%,
            rgba(109, 179, 242, 0.02) 0%,
            transparent 60%
          ),
          var(--bg);
      }

      .msg {
        max-width: 78%;
        padding: 11px 16px;
        border-radius: var(--radius);
        font-size: 14.5px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        animation: fadeIn 0.2s ease;
        position: relative;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg.user {
        align-self: flex-end;
        background: var(--blue-dim);
        color: #fff;
        border-bottom-right-radius: 4px;
        font-weight: 450;
      }

      .msg.assistant {
        align-self: flex-start;
        background: var(--surface2);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--border);
      }

      .msg.thinking {
        align-self: flex-start;
        color: var(--dim);
        font-style: italic;
        font-size: 13px;
        background: none;
        padding: 3px 18px;
        opacity: 0.8;
      }
      .msg.thinking::before {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--dim);
        margin-right: 8px;
        vertical-align: middle;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }

      .msg.tool {
        align-self: flex-start;
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--cyan);
        font-family: var(--mono);
        font-size: 13px;
        max-width: 85%;
        cursor: pointer;
        user-select: none;
        transition: border-color 0.2s;
      }
      .msg.tool:hover {
        border-color: var(--cyan);
      }
      .msg.tool .tool-header {
        padding: 9px 14px;
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .msg.tool .tool-header .arrow {
        color: var(--cyan);
        font-size: 13px;
        line-height: 1.4;
        transition: transform 0.2s;
        flex-shrink: 0;
      }
      .msg.tool.open .tool-header .arrow {
        transform: rotate(90deg);
      }
      .msg.tool .tool-header .info {
        flex: 1;
        min-width: 0;
      }
      .msg.tool .name {
        color: var(--cyan);
        font-weight: 650;
        font-size: 13.5px;
        margin-bottom: 2px;
      }
      .msg.tool .arg {
        color: var(--dim);
        margin: 2px 0;
      }
      .msg.tool .arg b {
        color: var(--fg);
        font-weight: 550;
      }
      .msg.tool .tool-body {
        display: none;
        border-top: 1px solid var(--border);
        padding: 9px 14px;
        color: var(--dim);
        font-size: 12.5px;
        font-family: var(--mono);
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 220px;
        overflow-y: auto;
      }
      .msg.tool.open .tool-body {
        display: block;
      }

      .msg.result {
        align-self: flex-start;
        color: var(--dim);
        font-size: 12.5px;
        font-family: var(--mono);
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 9px 14px;
        max-height: 180px;
        overflow-y: auto;
        max-width: 90%;
        border-radius: var(--radius-sm);
      }

      .msg.error {
        align-self: flex-start;
        color: var(--red);
        background: rgba(242, 98, 90, 0.08);
        border: 1px solid rgba(242, 98, 90, 0.18);
        font-weight: 480;
      }

      .msg.final {
        align-self: center;
        color: var(--dim2);
        font-size: 11px;
        background: none;
        padding: 2px 0;
        letter-spacing: 0.4px;
      }

      /* ── rendered markdown ────────────────────────── */

      .msg.assistant.rendered {
        white-space: normal;
      }

      .msg.assistant.rendered h1,
      .msg.assistant.rendered h2,
      .msg.assistant.rendered h3,
      .msg.assistant.rendered h4 {
        margin: 0.7em 0 0.35em;
        font-weight: 650;
        line-height: 1.3;
        color: var(--fg2);
      }
      .msg.assistant.rendered h1 {
        font-size: 1.35em;
      }
      .msg.assistant.rendered h2 {
        font-size: 1.18em;
        padding-bottom: 0.2em;
        border-bottom: 1px solid var(--border);
      }
      .msg.assistant.rendered h3 {
        font-size: 1.06em;
      }
      .msg.assistant.rendered h4 {
        font-size: 0.95em;
        color: var(--dim);
      }

      .msg.assistant.rendered p {
        margin: 0.45em 0;
      }
      .msg.assistant.rendered p:first-child {
        margin-top: 0;
      }
      .msg.assistant.rendered p:last-child {
        margin-bottom: 0;
      }

      .msg.assistant.rendered ul,
      .msg.assistant.rendered ol {
        margin: 0.35em 0;
        padding-left: 1.6em;
      }
      .msg.assistant.rendered li {
        margin: 0.18em 0;
      }

      .msg.assistant.rendered blockquote {
        margin: 0.45em 0;
        padding: 3px 12px;
        border-left: 3px solid var(--cyan);
        color: var(--dim);
        background: rgba(77, 212, 192, 0.04);
        border-radius: 0 6px 6px 0;
      }
      .msg.assistant.rendered a {
        color: var(--blue);
        text-decoration: none;
      }
      .msg.assistant.rendered a:hover {
        text-decoration: underline;
      }
      .msg.assistant.rendered hr {
        margin: 0.7em 0;
        border: none;
        border-top: 1px solid var(--border);
      }

      .msg.assistant.rendered table {
        margin: 0.45em 0;
        border-collapse: collapse;
        width: 100%;
        font-size: 13px;
        border-radius: 6px;
        overflow: hidden;
      }
      .msg.assistant.rendered th,
      .msg.assistant.rendered td {
        padding: 6px 12px;
        border: 1px solid var(--border);
        text-align: left;
      }
      .msg.assistant.rendered th {
        background: var(--surface);
        font-weight: 650;
        color: var(--fg2);
      }
      .msg.assistant.rendered td {
        background: var(--surface2);
      }

      .msg.assistant.rendered :not(pre) > code {
        background: rgba(109, 179, 242, 0.1);
        padding: 1.5px 6px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 0.88em;
        color: var(--blue);
      }

      .msg.assistant.rendered pre {
        margin: 0.5em 0;
        padding: 12px 15px;
        border-radius: var(--radius-sm);
        background: #0a0d11;
        border: 1px solid var(--border);
        overflow-x: auto;
        white-space: pre;
      }
      .msg.assistant.rendered pre code {
        background: none;
        padding: 0;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.5;
        color: var(--fg);
      }

      /* ── input bar ────────────────────────────────── */

      footer {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        gap: 10px;
        background: var(--surface);
        min-height: 71px;
      }
      footer textarea {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 11px 16px;
        color: var(--fg);
        font-size: 15px;
        outline: none;
        font-family: var(--font);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        resize: none;
        min-height: 46px;
        max-height: 200px;
        line-height: 1.55;
      }
      footer textarea:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(109, 179, 242, 0.12);
      }
      footer textarea::placeholder {
        color: var(--dim2);
      }

      footer button {
        background: var(--blue);
        color: #0a0d11;
        border: none;
        border-radius: var(--radius-sm);
        padding: 11px 22px;
        font-weight: 650;
        font-size: 14px;
        cursor: pointer;
        transition:
          background 0.2s,
          opacity 0.2s,
          box-shadow 0.2s;
        white-space: nowrap;
      }
      footer button:hover {
        background: #8bc7f6;
      }
      footer button:active {
        opacity: 0.85;
        transform: scale(0.98);
      }
      footer button:disabled {
        opacity: 0.35;
        cursor: default;
        pointer-events: none;
      }
      footer button.cancel {
        background: var(--red);
        color: #fff;
      }
      footer button.cancel:hover {
        background: #f87870;
      }

      /* ── empty state ──────────────────────────────── */

      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--dim2);
        gap: 8px;
      }
      .empty-state .empty-icon {
        opacity: 0.35;
        margin-bottom: 4px;
      }
      .empty-state .hint {
        font-size: 14px;
      }

      /* ── sidebar overlay (mobile) ─────────────────── */

      #edgeZone {
        display: none;
      }

      .sidebar-overlay {
        display: none;
      }

      /* ── responsive ───────────────────────────────── */

      @media (max-width: 750px) {
        body {
          grid-template-columns: 1fr;
          /* Lock the viewport: 100dvh is buggy on mobile Safari — it can
             be larger than the visible area when the address bar is
             showing, causing the entire body to scroll.  Fixed positioning
             anchors the layout to the actual visible viewport. */
          position: fixed;
          inset: 0;
          height: auto;
          /* overflow:hidden on the global html,body rule propagates to the
             viewport and clips position:fixed children in some browsers. */
          overflow: clip;
        }
        nav {
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          width: var(--sidebar-w);
          z-index: 100;
          transform: translateX(-100%);
          box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
          will-change: transform;
        }
        nav.open {
          transform: translateX(0);
          touch-action: none;
        }
        .sidebar-overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.4);
          z-index: 99;
          /* Prevent the browser from claiming touches on the overlay
             (e.g. scrolling) so our swipe-to-close gesture works. */
          touch-action: none;
        }
        .sidebar-overlay.open {
          display: block;
        }
        #edgeZone {
          display: block;
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          width: 40px;
          z-index: 1;
          /* Prevent the browser from claiming left-edge touches so
             our swipe-to-open gesture owns them. */
          touch-action: none;
        }
        header .menu-btn {
          display: block;
        }
        main {
          padding: 14px;
          gap: 10px;
        }
        .msg {
          max-width: 88%;
          font-size: 14px;
          padding: 10px 14px;
        }
        .msg.tool {
          max-width: 94%;
        }
        .msg.result {
          max-width: 96%;
        }
        header {
          padding: 10px 14px;
        }
        footer {
          padding: 10px 14px;
          gap: 8px;
          min-height: 0;
        }
        footer textarea {
          font-size: 16px;
        } /* prevent iOS zoom */
        footer button {
          padding: 11px 16px;
          font-size: 14px;
        }
        nav .sidebar-footer {
          min-height: 0;
        }
      }

      @media (max-width: 400px) {
        main {
          padding: 10px;
          gap: 8px;
        }
        .msg {
          max-width: 93%;
          font-size: 13.5px;
          padding: 9px 12px;
        }
        header {
          padding: 8px 10px;
        }
        footer {
          padding: 8px 10px;
        }
      }

      /* ── pull-to-refresh indicator ──────────────── */

      #refreshIndicator {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        transform: translateY(-100%);
        z-index: 150;
        pointer-events: none;
      }
      #refreshIndicator .refresh-label {
        font-size: 13px;
        color: var(--dim);
        transition: color 0.15s;
      }
      #refreshIndicator.ready .refresh-label {
        color: var(--blue);
      }
    </style>
  </head>
  <body>
    <!-- ── sidebar ──────────────────────────────── -->
    <div class="sidebar-overlay" id="overlay"></div>
    <div id="edgeZone"></div>
    <nav id="sidebar">
      <div class="sidebar-header">
        <img
          class="logo-icon"
          src="/icon-192.png"
          width="18"
          height="18"
          alt=""
        />
        <span>goop</span>
      </div>
      <div class="session-list" id="sessionList"></div>
      <div class="sidebar-footer">
        <button class="new-btn" id="newSessionBtn">+ New session</button>
      </div>
    </nav>

    <!-- ── main area ────────────────────────────── -->
    <div class="main">
      <div id="refreshIndicator">
        <span class="refresh-label">Pull to refresh</span>
      </div>
      <header>
        <button class="menu-btn" id="menuBtn" title="Sessions">☰</button>
        <div class="dot" id="dot"></div>
        <span class="title" id="title">goop</span>
        <span class="status" id="status">connecting…</span>
        <button
          class="reload-btn"
          id="reloadBtn"
          title="Force reload (clear cache)"
        >
          ↻
        </button>
      </header>

      <main id="log">
        <div class="empty-state" id="emptyState">
          <img
            class="empty-icon"
            src="/icon-192.png"
            width="48"
            height="48"
            alt=""
          />
          <div class="hint">Select or create a session to begin</div>
        </div>
      </main>

      <footer>
        <textarea
          id="input"
          placeholder="Ask anything…"
          autocomplete="off"
          autofocus
          rows="1"
        ></textarea>
        <button id="send" disabled>Send</button>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <!-- swipe sidebar uses raw touch events on targeted zones (not Hammer)
         so text selection on messages remains native -->
    <script>
      // ── DOM refs ────────────────────────────────────
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      const menuBtn = document.getElementById("menuBtn");
      const sessionList = document.getElementById("sessionList");
      const newSessionBtn = document.getElementById("newSessionBtn");
      const log = document.getElementById("log");
      const emptyState = document.getElementById("emptyState");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const dot = document.getElementById("dot");
      const statusEl = document.getElementById("status");
      const titleEl = document.getElementById("title");
      const reloadBtn = document.getElementById("reloadBtn");

      // ── state ────────────────────────────────────────
      let ws = null;
      let currentSession = null; // name of the active session
      let sessions = []; // [{ name }]
      let thinkingEl = null;
      let assistantEl = null;
      let buf = "";
      let running = false;
      let lastToolEl = null;
      let userAtBottom = true; // tracks whether user has scrolled away
      let programmaticScroll = false; // guard: ignore scroll events from our own scrollTo
      let swipeActive = false; // guard: pause autoscroll during sidebar swipe

      // ── sidebar toggle (mobile) ─────────────────────
      function closeSidebar() {
        sidebar.classList.remove("open");
        overlay.classList.remove("open");
        // Clear any leftover inline styles from the swipe gesture so
        // the CSS class rules take over immediately.
        sidebar.style.transform = "";
        sidebar.style.transition = "";
        sidebar.style.willChange = "";
        overlay.style.display = "";
        overlay.style.opacity = "";
        overlay.style.transition = "";
      }

      menuBtn.addEventListener("click", () => {
        // Add a temporary transition for the snap animation,
        // then remove it so it can't interfere with swipes.
        sidebar.style.transition =
          "transform 0.2s cubic-bezier(0.0, 0.0, 0.2, 1)";
        if (sidebar.classList.contains("open")) {
          closeSidebar();
        } else {
          sidebar.classList.add("open");
          overlay.classList.add("open");
        }
        sidebar.addEventListener(
          "transitionend",
          function () {
            sidebar.style.transition = "";
          },
          { once: true },
        );
      });
      overlay.addEventListener("click", closeSidebar);

      // ── force reload (clear SW + cache, then hard reload) ──
      reloadBtn.addEventListener("click", async () => {
        reloadBtn.textContent = "⏳";
        reloadBtn.style.pointerEvents = "none";
        try {
          // Unregister all service workers so stale code can't survive
          const registrations =
            await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((r) => r.unregister()));
          // Nuke all cache storage
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        } catch (_) {
          // best-effort; proceed to reload
        }
        location.reload();
      });

      // ── swipe sidebar (raw touch events on targeted zones) ─────────────
      // Touchstart is only on #edgeZone (open), #overlay (close), and
      // #sidebar (close).  The rest of the page never sees our touch
      // handlers, so native text selection works unhindered.
      //
      // Key design: touchstart never calls preventDefault.  Instead we defer
      // it to touchmove and only commit after the finger moves past a 5 px
      // dead zone.  This means a tap (no movement) generates a normal click
      // event — session names work, overlay close works, and the session
      // list scrolls natively.  Only actual horizontal swipes are captured.
      (function () {
        const sidebarEl = document.getElementById("sidebar");
        const overlayEl = document.getElementById("overlay");
        const edgeZone = document.getElementById("edgeZone");
        const EDGE_WIDTH = 40;
        const SWIPE_THRESHOLD = 60;
        const DEAD_ZONE = 5; // px before we decide "swipe" vs "tap/scroll"

        let mode = null; // "open" | "close"
        let startX = 0;
        let committed = false; // preventDefault called, gesture is ours

        function startSwipe(x, m) {
          swipeActive = true;
          mode = m;
          startX = x;
          committed = false;
          sidebarEl.style.transition = "none";
          sidebarEl.style.willChange = "transform";
          if (m === "open") {
            overlayEl.style.display = "block";
            overlayEl.style.opacity = "0";
          }
        }

        function endSwipe(shouldOpen) {
          swipeActive = false;
          const sidebarWidth = sidebarEl.offsetWidth || 250;
          const target = shouldOpen
            ? "translateX(0)"
            : `translateX(-${sidebarWidth}px)`;

          sidebarEl.style.transition =
            "transform 0.2s cubic-bezier(0.0, 0.0, 0.2, 1)";
          sidebarEl.style.transform = target;

          overlayEl.style.transition =
            "opacity 0.2s cubic-bezier(0.0, 0.0, 0.2, 1)";
          overlayEl.style.opacity = shouldOpen ? "1" : "0";

          if (shouldOpen) {
            sidebarEl.classList.add("open");
            overlayEl.classList.add("open");
          } else {
            sidebarEl.classList.remove("open");
            overlayEl.classList.remove("open");
          }

          sidebarEl.addEventListener(
            "transitionend",
            function cleanup() {
              sidebarEl.style.transition = "";
              sidebarEl.style.transform = "";
              sidebarEl.style.willChange = "";
              overlayEl.style.transition = "";
              overlayEl.style.display = "";
              overlayEl.style.opacity = "";
              sidebarEl.removeEventListener("transitionend", cleanup);
            },
            { once: true },
          );

          mode = null;
          committed = false;
        }

        // ── opening swipe: only on the left-edge zone ──────────────────
        edgeZone.addEventListener(
          "touchstart",
          function (e) {
            if (swipeActive || e.touches.length !== 1) return;
            if (sidebarEl.classList.contains("open")) return;
            if (e.touches[0].clientX > EDGE_WIDTH) return;
            startSwipe(e.touches[0].clientX, "open");
            // Edge zone has no interactive content; prevent default eagerly.
            e.preventDefault();
            committed = true;
          },
          { passive: false },
        );

        // ── closing swipe: overlay + sidebar ──────────────────────────
        function onCloseTouchStart(e) {
          if (swipeActive || e.touches.length !== 1) return;
          if (!sidebarEl.classList.contains("open")) return;
          // Do NOT preventDefault here — defer to touchmove so taps
          // still generate click events (session names, overlay close).
          startSwipe(e.touches[0].clientX, "close");
        }
        overlayEl.addEventListener("touchstart", onCloseTouchStart, {
          passive: false,
        });
        sidebarEl.addEventListener("touchstart", onCloseTouchStart, {
          passive: false,
        });

        // ── shared move / end / cancel on document ────────────────────
        document.addEventListener(
          "touchmove",
          function (e) {
            if (!swipeActive) return;

            const deltaX = e.touches[0].clientX - startX;

            // Don't commit until the finger moves past the dead zone.
            // This lets vertical scrolling (session list) and taps work.
            if (!committed) {
              if (Math.abs(deltaX) < DEAD_ZONE) return;
              committed = true;
            }
            e.preventDefault();

            const sidebarWidth = sidebarEl.offsetWidth || 250;
            let px;

            if (mode === "open") {
              // Clamp to [-sidebarWidth, 0] — sidebar can't slide left past
              // fully closed or right past fully open.
              px = Math.max(-sidebarWidth, Math.min(0, -sidebarWidth + deltaX));
            } else {
              px = Math.max(-sidebarWidth, Math.min(0, deltaX));
            }

            sidebarEl.style.transform = `translateX(${px}px)`;

            const progress = (sidebarWidth + px) / sidebarWidth;
            overlayEl.style.display = progress > 0 ? "block" : "none";
            overlayEl.style.opacity = Math.max(0, Math.min(1, progress * 0.45));
          },
          { passive: false },
        );

        document.addEventListener("touchend", function (e) {
          if (!swipeActive) return;

          if (!committed) {
            // Finger never moved past dead zone — it was a tap.
            // Let the click event fire; just clean up without snapping.
            swipeActive = false;
            mode = null;
            committed = false;
            sidebarEl.style.transition = "";
            sidebarEl.style.transform = "";
            sidebarEl.style.willChange = "";
            // Overlay was already visible (class "open"); don't touch it.
            return;
          }

          const deltaX = e.changedTouches[0].clientX - startX;
          let shouldOpen;
          if (mode === "open") {
            shouldOpen = deltaX > SWIPE_THRESHOLD;
          } else {
            shouldOpen = deltaX > -SWIPE_THRESHOLD;
          }
          endSwipe(shouldOpen);
        });

        document.addEventListener("touchcancel", function () {
          if (!swipeActive) return;
          const wasOpen = sidebarEl.classList.contains("open");
          swipeActive = false;
          committed = false;
          sidebarEl.style.transform = "";
          sidebarEl.style.transition = "";
          sidebarEl.style.willChange = "";
          overlayEl.style.display = "";
          overlayEl.style.opacity = "";
          overlayEl.style.transition = "";
          if (wasOpen) {
            sidebarEl.classList.add("open");
            overlayEl.classList.add("open");
          } else {
            sidebarEl.classList.remove("open");
            overlayEl.classList.remove("open");
          }
          mode = null;
        });
      })();

      // ── pull-to-refresh (touch events + CSS transition) ──
      (function () {
        var REFRESH_THRESHOLD = 64;
        var indicator = document.getElementById("refreshIndicator");
        var tracking = false;
        var startY = 0;

        log.addEventListener(
          "touchstart",
          function (e) {
            if (tracking) return;
            if (log.scrollTop > 0) return;
            if (e.touches.length !== 1) return;
            if (e.touches[0].clientX <= 40) return; // sidebar swipe territory
            tracking = true;
            startY = e.touches[0].clientY;
            e.preventDefault();
          },
          { passive: false },
        );

        log.addEventListener(
          "touchmove",
          function (e) {
            if (!tracking) return;
            var dy = Math.max(0, e.touches[0].clientY - startY);
            var progress = Math.min(1, dy / REFRESH_THRESHOLD);
            var offset = -48 + progress * 48;
            indicator.style.transform = "translateY(" + offset + "px)";
            indicator.classList.toggle("ready", dy >= REFRESH_THRESHOLD);
          },
          { passive: false },
        );

        log.addEventListener("touchend", function (e) {
          if (!tracking) return;
          tracking = false;

          var dy = e.changedTouches[0].clientY - startY;
          if (dy >= REFRESH_THRESHOLD) {
            location.reload();
          } else {
            // Spring back.
            indicator.style.transition =
              "transform 0.2s cubic-bezier(0.0, 0.0, 0.2, 1)";
            indicator.style.transform = "translateY(-100%)";
            indicator.classList.remove("ready");
            indicator.addEventListener(
              "transitionend",
              function () {
                indicator.style.transition = "";
                indicator.style.transform = "";
              },
              { once: true },
            );
          }
        });

        log.addEventListener("touchcancel", function () {
          if (!tracking) return;
          tracking = false;
          indicator.style.transform = "translateY(-100%)";
          indicator.classList.remove("ready");
        });
      })();

      // ── session list ─────────────────────────────────
      async function fetchSessions() {
        const res = await fetch("/api/sessions");
        if (!res.ok) return;
        sessions = await res.json();
        renderSessionList();
      }

      function renderSessionList() {
        sessionList.innerHTML = "";
        for (const s of sessions) {
          const el = document.createElement("div");
          el.className =
            "session-item" + (s === currentSession ? " active" : "");
          el.innerHTML = `<span class="name">${esc(s)}</span><button class="del-btn" title="Delete session">&times;</button>`;
          el.querySelector(".name").addEventListener("click", () =>
            switchSession(s),
          );
          el.querySelector(".del-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            deleteSession(s);
          });
          sessionList.appendChild(el);
        }
      }

      async function switchSession(name) {
        if (name === currentSession) return;
        closeSidebar();

        // Disconnect old socket.
        if (ws) {
          ws.onclose = null; // don't reconnect on intentional close
          ws.close();
          ws = null;
        }

        // Clear UI and reset running state (the old session's
        // FinalResponse/Cancelled events went to the closed socket).
        clearMessages();
        setRunning(false);
        currentSession = name;
        titleEl.textContent = name;
        updateHash();
        renderSessionList();
        connect();
      }

      async function createSession() {
        const name = prompt("Session name (leave blank for auto-generated):");
        const body = name ? { name } : {};
        const res = await fetch("/api/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) return;
        const data = await res.json();
        await fetchSessions();
        switchSession(data.name);
      }

      async function deleteSession(name) {
        const res = await fetch(`/api/sessions/${encodeURIComponent(name)}`, {
          method: "DELETE",
        });
        if (!res.ok) return;
        // Remove from local list.
        sessions = sessions.filter((s) => s !== name);
        // If we deleted the current session, switch to another or clear.
        if (name === currentSession) {
          if (ws) {
            ws.onclose = null;
            ws.close();
            ws = null;
          }
          clearMessages();
          setRunning(false);
          currentSession = null;
          titleEl.textContent = "goop";
          updateHash();
          if (sessions.length > 0) {
            switchSession(sessions[0]);
          } else {
            emptyState.style.display = "flex";
            dot.classList.remove("live");
            statusEl.textContent = "no session";
            sendBtn.disabled = true;
          }
        }
        renderSessionList();
      }

      newSessionBtn.addEventListener("click", createSession);

      // ── URL hash ─────────────────────────────────────
      function updateHash() {
        if (currentSession) {
          history.replaceState(null, "", `#session=${currentSession}`);
        } else {
          history.replaceState(null, "", window.location.pathname);
        }
      }

      function sessionFromHash() {
        const m = window.location.hash.match(/^#session=(.+)$/);
        return m ? decodeURIComponent(m[1]) : null;
      }

      // ── websocket ────────────────────────────────────
      function connect() {
        if (!currentSession) return;

        const proto = location.protocol === "https:" ? "wss" : "ws";
        const host = location.host || "127.0.0.1:8187";
        const url = `${proto}://${host}/ws?session=${encodeURIComponent(currentSession)}`;
        ws = new WebSocket(url);

        ws.onopen = () => {
          dot.classList.add("live");
          statusEl.textContent = "connected";
          sendBtn.disabled = false;
          emptyState.style.display = "none";
        };

        ws.onclose = () => {
          dot.classList.remove("live");
          statusEl.textContent = "reconnecting…";
          sendBtn.disabled = true;
          // Reconnect after a delay if we still have a current session.
          if (currentSession) {
            setTimeout(connect, 2000);
          }
        };

        ws.onmessage = (e) => {
          const evt = JSON.parse(e.data);
          handle(evt);
        };
      }

      // ── event handling ───────────────────────────────
      function handle(evt) {
        switch (evt.type) {
          case "SessionState":
            setRunning(evt.data.running);
            return;

          case "UserPrompt":
            append("user", evt.data.content);
            scrollDown(true);
            return;

          case "Thinking":
            if (!thinkingEl) {
              thinkingEl = div("thinking", "thinking…");
              log.appendChild(thinkingEl);
            }
            break;

          case "AssistantText":
            removeThinking();
            buf += evt.data;
            if (!assistantEl) {
              assistantEl = div("assistant", buf);
              log.appendChild(assistantEl);
            } else {
              assistantEl.textContent = buf;
            }
            break;

          case "ToolCall": {
            removeThinking();
            flushBufWithEl();
            const t = evt.data;
            const el = document.createElement("div");
            el.className = "msg tool tool-call";
            let html =
              '<div class="tool-header"><span class="arrow">▸</span><div class="info">';
            html += `<div class="name">${esc(t.name)}</div>`;
            if (t.arguments && typeof t.arguments === "object") {
              for (const [k, v] of Object.entries(t.arguments)) {
                const val =
                  typeof v === "string"
                    ? trunc(esc(v), 120)
                    : trunc(esc(JSON.stringify(v)), 120);
                html += `<div class="arg"><b>${esc(k)}:</b> ${val}</div>`;
              }
            }
            html += "</div></div>";
            html += '<div class="tool-body"></div>';
            el.innerHTML = html;
            el.querySelector(".tool-header").addEventListener("click", () => {
              el.classList.toggle("open");
              scrollDown();
            });
            log.appendChild(el);
            lastToolEl = el;
            break;
          }

          case "ToolResult": {
            flushBufWithEl();
            if (evt.data.content && lastToolEl) {
              const body = lastToolEl.querySelector(".tool-body");
              if (body) {
                body.textContent = trunc(evt.data.content, 500);
              }
              lastToolEl = null;
            }
            break;
          }

          case "FinalResponse":
            removeThinking();
            if (assistantEl) {
              const raw = assistantEl.textContent;
              assistantEl.innerHTML = DOMPurify.sanitize(marked.parse(raw));
              assistantEl.classList.add("rendered");
            }
            flushBufWithEl();
            append("final", "—");
            setRunning(false);
            break;

          case "Error":
            removeThinking();
            flushBufWithEl();
            append("error", evt.data);
            setRunning(false);
            break;

          case "Cancelled":
            removeThinking();
            flushBufWithEl();
            append("final", "cancelled");
            setRunning(false);
            break;
        }
        scrollDown();
      }

      function clearMessages() {
        log.innerHTML = "";
        thinkingEl = null;
        assistantEl = null;
        buf = "";
        lastToolEl = null;
        userAtBottom = true;
        // Re-add empty state.
        log.appendChild(emptyState);
      }

      function flushBufWithEl() {
        assistantEl = null;
        buf = "";
      }

      function removeThinking() {
        if (thinkingEl) {
          thinkingEl.remove();
          thinkingEl = null;
        }
      }

      function append(cls, text) {
        const el = div(cls, text);
        log.appendChild(el);
        assistantEl = cls === "assistant" ? el : assistantEl;
      }

      function div(cls, text) {
        const el = document.createElement("div");
        el.className = "msg " + cls;
        el.textContent = text;
        return el;
      }

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function trunc(s, n) {
        return s.length > n ? s.slice(0, n - 1) + "…" : s;
      }

      function scrollDown(force) {
        if (swipeActive) return;
        if (force || userAtBottom) {
          programmaticScroll = true;
          log.scrollTo({ top: log.scrollHeight, behavior: "auto" });
          requestAnimationFrame(() => {
            // RAF fires before the next paint, but the scroll event may
            // fire asynchronously on some browsers. Double-RAF to be safe.
            requestAnimationFrame(() => {
              programmaticScroll = false;
            });
          });
        }
      }

      // Track whether the user is scrolled to the bottom.  The scroll
      // event fires on both user-initiated and programmatic scrolls, so
      // we guard against our own scrollTo calls.  Threshold is 2 px to
      // tolerate sub-pixel rounding on HiDPI screens.
      log.addEventListener("scroll", () => {
        if (programmaticScroll) return;
        const threshold = 2;
        userAtBottom =
          log.scrollHeight - log.scrollTop - log.clientHeight <= threshold;
      });

      // ── input ────────────────────────────────────
      function resizeInput() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 200) + "px";
      }
      input.addEventListener("input", resizeInput);

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          doSend();
        }
      });

      sendBtn.addEventListener("click", doSend);

      function setRunning(v) {
        running = v;
        if (v) {
          sendBtn.textContent = "Cancel";
          sendBtn.classList.add("cancel");
        } else {
          sendBtn.textContent = "Send";
          sendBtn.classList.remove("cancel");
        }
      }

      function doSend() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        if (running) {
          ws.send(JSON.stringify({ type: "cancel" }));
          return;
        }

        const text = input.value.trim();
        if (!text) return;
        ws.send(JSON.stringify({ type: "prompt", content: text }));
        input.value = "";
        input.style.height = "auto";
        input.focus();
        setRunning(true);
      }

      // ── start ────────────────────────────────────
      async function init() {
        await fetchSessions();

        // Determine initial session: URL hash > first in list > none.
        const hashSession = sessionFromHash();
        if (hashSession) {
          // If it's not in the list, add it (it may exist on disk).
          if (!sessions.includes(hashSession)) {
            sessions.push(hashSession);
            sessions.sort();
          }
          switchSession(hashSession);
        } else if (sessions.length > 0) {
          switchSession(sessions[0]);
        } else {
          // No sessions at all — show empty state.
          emptyState.style.display = "flex";
          dot.classList.remove("live");
          statusEl.textContent = "no session";
          sendBtn.disabled = true;
        }
        resizeInput();
      }

      init();

      // ── service worker (PWA) ───────────────────
      let deferredInstall = null;

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/sw.js")
          .then((reg) => {
            console.log("PWA: service worker registered");
            // Subscribe to push after SW is ready.
            subscribePush();
          })
          .catch(() => {});
        window.addEventListener("beforeinstallprompt", (e) => {
          e.preventDefault();
          deferredInstall = e;
          console.log("PWA: install prompt available");
        });
        window.addEventListener("appinstalled", () => {
          console.log("PWA: installed");
          deferredInstall = null;
          // Re-subscribe after install (keys may change).
          subscribePush();
        });
      }

      // ── push subscription ────────────────────────
      async function subscribePush() {
        if (!("Notification" in window)) return;
        if (!("PushManager" in window)) return;

        const perm = await Notification.requestPermission();
        if (perm !== "granted") return;

        const reg = await navigator.serviceWorker.getRegistration();
        if (!reg) return;

        // Get the VAPID public key from the server.
        let publicKey;
        try {
          const resp = await fetch("/api/vapid-public-key");
          const data = await resp.json();
          publicKey = data.publicKey;
        } catch (_) {
          return;
        }

        try {
          const sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicKey),
          });
          await fetch("/api/push-subscribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ subscription: sub.toJSON() }),
          });
          console.log("PWA: push subscribed");
        } catch (e) {
          console.warn("PWA: push subscribe failed:", e);
        }
      }

      function urlBase64ToUint8Array(s) {
        const padding = "=".repeat((4 - (s.length % 4)) % 4);
        const raw = atob(s.replace(/-/g, "+").replace(/_/g, "/") + padding);
        return Uint8Array.from(raw, (c) => c.charCodeAt(0));
      }
    </script>
  </body>
</html>
